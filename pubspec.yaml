name: hms
description: "Home Management System — Family Digital Household Manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^3.3.0
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # Firebase
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0

  # Notifications (local only — no Cloud Functions)
  flutter_local_notifications: ^21.0.0

  # Charts
  fl_chart: ^1.2.0

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.9.4

  # Linting
  riverpod_lint: ^3.1.0

  # Testing
  fake_cloud_firestore: ^4.1.0

flutter:
  uses-material-design: true
